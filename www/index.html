<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ture: Spot bots before they say hi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blue: #269;
        --light-blue: #bbddf5;
        --background: #f7fbff;
        --text: #182333;
        --muted: #607086;
        --border: #dcecf8;
        --button-bg: white;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #101820;
          --text: #f4f8ff;
          --muted: #a7b5c8;
          --border: #243447;
          --button-bg: #172330;
        }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Nunito", sans-serif;
        background: var(--background);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        max-width: 900px;
        width: 100%;
        margin: 0 auto;
        padding: 28px 24px;
        position: sticky;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: clamp(16px, 5vw, 24px);
        font-weight: 800;
      }

      .logo img {
        width: clamp(25px, 7vw, 38px);
      }

      .hero {
        max-width: 900px;
        margin: auto;
        padding: 0 24px;
        text-align: center;
      }

      .hero img {
        width: clamp(92px, 7vw, 140px);
        margin-bottom: 28px;
      }

      h1 {
        font-size: clamp(42px, 7vw, 64px);
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: -1px;
      }

      h1 span {
        color: var(--blue);
      }

      .description {
        max-width: 560px;
        margin: 22px auto;
        color: var(--muted);
        font-size: 20px;
        line-height: 1.5;
      }

      .buttons {
        margin: 32px auto auto;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        width: fit-content;
        gap: 14px;
      }

      .button {
        padding: 13px 26px;
        border-radius: 999px;
        flex-grow: 1;
        text-decoration: none;
        color: white;
        font-weight: 800;
      }

      .primary {
        background: var(--blue);
        color: white;
      }

      .secondary {
        background: var(--button-bg);
        color: var(--blue);
        border: 2px solid var(--border);
      }

      @media (prefers-color-scheme: dark) {
        .secondary {
          color: var(--light-blue);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <img alt="Ture logo, checkmark icon" src="./logo.svg" />
        Ture
      </div>
    </header>
    <section class="hero">
      <h1>
        Spot bots<br />
        <span>before they <span title="Say hi">👋</span></span>
      </h1>
      <p class="description">Verifies incoming members with simple emoji challenges.</p>
      <div class="buttons">
        <a
          class="button primary"
          href="https://discord.com/oauth2/authorize?client_id=1525703681587155064"
          target="_blank"
          >Add Ture</a
        >
        <a class="button secondary" href="https://github.com/Inbestigator/captcha" target="_blank"
          >See the source</a
        >
      </div>
    </section>
  </body>
</html>
